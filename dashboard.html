<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم السمسار - عقارات مسير</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
        }
        @media (max-width: 768px) {
            .dashboard-container { padding: 20px; }
            .dashboard-header { flex-direction: column; text-align: center; gap: 10px; }
            .form-row { grid-template-columns: 1fr; }
        }
        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--light); padding-bottom: 20px;
        }
        .dashboard-header h2 { color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        textarea { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 8px; resize: vertical; font-family: inherit; }
        .file-upload-box { border: 2px dashed var(--primary); padding: 30px; text-align: center; border-radius: 8px; background: var(--light); cursor: pointer; margin-bottom: 20px; }
        .file-upload-box input { display: none; }
        .file-upload-box i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .progress-bar { width: 100%; background: var(--light); border-radius: 4px; height: 10px; margin-bottom: 20px; display: none; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 0.3s; }
        .thumbnails-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .thumbnail-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border); }

        /* Profile Styles */
        .profile-header {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            margin-top: 20px;
        }
        .cover-photo {
            height: 200px;
            background: linear-gradient(135deg, var(--primary) 0%, #1e3a8a 100%);
        }
        .profile-info {
            padding: 20px;
            display: flex;
            align-items: flex-end;
            margin-top: -60px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--primary);
            border: 4px solid var(--white);
            box-shadow: var(--shadow);
            margin-left: 20px;
            z-index: 2;
        }
        .profile-details h2 { margin: 0; color: var(--dark); font-size: 1.8rem; }
        .profile-details p { color: #64748b; margin-top: 5px; font-weight: bold; }
        
        .profile-tabs {
            display: flex;
            background: var(--white);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }
        .profile-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 8px;
            color: #64748b;
            transition: 0.3s;
        }
        .profile-tab.active { background: var(--primary); color: var(--white); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .my-properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .prop-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            transition: 0.3s;
        }
        .prop-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .prop-card img { width: 100%; height: 200px; object-fit: cover; }
        .prop-card-body { padding: 20px; }
        .prop-card-body h3 { font-size: 1.2rem; color: var(--dark); margin-bottom: 10px; }
        .prop-card-price { color: var(--primary); font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; }
        .prop-card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            border-top: 1px solid var(--light);
            padding-top: 15px;
        }
        .btn-delete {
            background: #fee2e2; color: #ef4444; border: none; padding: 10px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }
        .btn-delete:hover { background: #ef4444; color: #fff; }
    </style>
</head>

<body class="bg-light">

    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-house-chimney"></i> عقارات مسير
            </a>
            <nav class="nav-links">
                <a href="index.html">البوابة الرئيسية</a>
                <a href="properties.html">العقارات</a>
                <a href="#" class="btn-primary-outline" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i>
                    تسجيل الخروج</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="cover-photo"></div>
            <div class="profile-info">
                <div class="profile-avatar" id="avatarContainer" style="cursor: pointer; position: relative;" title="تغيير الصورة الشخصية">
                    <img id="brokerAvatarImg" src="" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none;">
                    <i class="fa-solid fa-user-tie" id="defaultAvatarIcon"></i>
                    <div style="position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border: 2px solid white;">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                </div>
                <input type="file" id="avatarInput" hidden accept="image/*">
                <div class="profile-details">
                    <h2 id="brokerDisplayName">جاري التحميل...</h2>
                    <p><i class="fa-solid fa-building"></i> إجمالي العقارات التي أضفتها: <span id="propCount" style="color: var(--primary); font-size: 1.1rem;">0</span></p>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="profile-tabs">
            <div class="profile-tab active" onclick="switchTab(event, 'myProps')"><i class="fa-solid fa-list"></i> عقاراتي</div>
            <div class="profile-tab" onclick="switchTab(event, 'addProp')"><i class="fa-solid fa-plus"></i> إضافة عقار جديد</div>
        </div>

        <!-- My Properties Tab -->
        <div id="tab-myProps" class="tab-content active">
            <div class="my-properties-grid" id="myPropertiesList">
                <div style="text-align:center; padding: 40px; grid-column: 1 / -1;">
                    <i class="fa-solid fa-spinner fa-spin fa-2x" style="color: var(--primary);"></i>
                    <p>جاري تحميل عقاراتك...</p>
                </div>
            </div>
        </div>

        <!-- Add Property Tab -->
        <div id="tab-addProp" class="tab-content">
            <div class="dashboard-container">
                <div class="dashboard-header">
                    <h2><i class="fa-solid fa-plus-circle"></i> إضافة عقار جديد</h2>
                </div>

                <form id="addPropertyForm">
                <div class="form-group">
                    <label>عنوان العقار</label>
                    <input type="text" id="propTitle" class="w-100"
                        style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;" required
                        placeholder="مثال: فيلا للبيع تشطيب سوبر لوكس">
                </div>

                <div class="form-group">
                    <label>اسم السمسار أو الشركة</label>
                    <input type="text" id="brokerName" class="w-100"
                        style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;" required
                        placeholder="مثال: شركة مسير للعقارات">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>نوع العقار</label>
                        <select id="propType" class="w-100"
                            style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;">
                            <option value="apartment">شقة</option>
                            <option value="house">منزل</option>
                            <option value="villa">فيلا</option>
                            <option value="land">أرض</option>
                            <option value="shop">محل تجاري</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>المنطقة</label>
                        <select id="propArea" class="w-100"
                            style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;">
                            <option value="center">وسط البلد</option>
                            <option value="north">شمال مسير</option>
                            <option value="south">جنوب مسير</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>السعر (بالجنيه)</label>
                        <input type="number" id="propPrice" class="w-100"
                            style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;" required>
                    </div>
                    <div class="form-group">
                        <label>المساحة (بالمتر المربع)</label>
                        <input type="number" id="propSize" class="w-100"
                            style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;" required placeholder="مثال: 120">
                    </div>
                </div>

                <div class="form-group" id="floorsContainer" style="display: none; margin-top: 20px;">
                    <label>عدد الطوابق (للمنازل والفلل)</label>
                    <input type="number" id="propFloors" class="w-100"
                        style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;" placeholder="مثال: 3">
                </div>

                <div class="form-group">
                    <label>رقم هاتف التواصل</label>
                    <input type="tel" id="propPhone" class="w-100"
                        style="padding: 12px; border: 1px solid var(--border); border-radius: 8px;" required placeholder="مثال: 01012345678">
                </div>

                <div class="form-group">
                    <label>وصف العقار</label>
                    <textarea id="propDesc" rows="4" required placeholder="اكتب تفاصيل العقار بدقة..."></textarea>
                </div>

                <div class="form-group">
                    <label>صور العقار</label>
                    <div style="background: #f8fafc; border: 2px dashed var(--border); border-radius: 12px; padding: 20px;">
                        <div id="thumbnailsContainer" class="thumbnails-container" style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 0;">
                            <!-- Thumbnails will appear here -->
                            <button type="button" onclick="document.getElementById('propImage').click()" class="btn-add-img" style="width: 100px; height: 100px; border: 2px dashed var(--primary); border-radius: 8px; background: #fff; color: var(--primary); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; gap: 5px;">
                                <i class="fa-solid fa-plus-circle fa-2x"></i>
                                <span style="font-size: 0.7rem; font-weight: bold;">أضف صورة</span>
                            </button>
                        </div>
                    </div>
                    <input type="file" id="propImage" accept="image/*" multiple hidden>
                    <p style="color: #64748b; font-size: 0.85rem; margin-top: 10px;"><i class="fa-solid fa-circle-info"></i> يمكنك اختيار أكثر من صورة في المرة الواحدة، أو إضافة الصور واحدة تلو الأخرى.</p>
                </div>

                <div class="progress-bar" id="uploadProgress">
                    <div class="progress-fill" id="uploadFill"></div>
                </div>

                <button type="submit" class="btn-primary w-100" id="btnSubmit">
                    <i class="fa-solid fa-paper-plane"></i> نشر العقار
                </button>
                <div id="dashAlert" class="alert" style="display:none;"></div>
            </form>
            </div>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-storage-compat.js"></script>

    <!-- Custom JS -->
    <script src="firebase-config.js"></script>
    <script>
        let currentUserId = localStorage.getItem('brokerId');
        let currentUserName = localStorage.getItem('brokerName');
        let currentUserPhone = localStorage.getItem('brokerPhone');
        
        let editMode = false;
        let editId = null;
        let existingImages = [];
        let selectedFiles = []; // Global list for "Add Another" logic

        // Load Profile Photo
        async function loadProfilePhoto(uid) {
            const firestore = db || window.db;
            if (!firestore) return;

            try {
                const doc = await firestore.collection('brokers').doc(uid).get();
                if (doc.exists && doc.data().profileImageUrl) {
                    const url = doc.data().profileImageUrl;
                    document.getElementById('brokerAvatarImg').src = url;
                    document.getElementById('brokerAvatarImg').style.display = 'block';
                    document.getElementById('defaultAvatarIcon').style.display = 'none';
                    localStorage.setItem('brokerPhoto', url);
                }
            } catch (e) {
                console.error("Error loading profile photo:", e);
            }
        }

        // Avatar Upload Logic
        document.getElementById('avatarContainer').addEventListener('click', () => {
            document.getElementById('avatarInput').click();
        });

        document.getElementById('avatarInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const firestore = db || window.db;
            if (!firestore) return;

            const avatarContainer = document.getElementById('avatarContainer');
            const originalHTML = avatarContainer.innerHTML;
            avatarContainer.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', cloudinaryConfig.uploadPreset);

                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudinaryConfig.cloudName}/image/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('فشل الرفع');

                const data = await response.json();
                const photoUrl = data.secure_url;

                // Update Firestore
                await firestore.collection('brokers').doc(currentUserId).update({
                    profileImageUrl: photoUrl
                });

                // Update UI
                document.getElementById('brokerAvatarImg').src = photoUrl;
                document.getElementById('brokerAvatarImg').style.display = 'block';
                document.getElementById('defaultAvatarIcon').style.display = 'none';
                avatarContainer.innerHTML = originalHTML;
                document.getElementById('brokerAvatarImg').src = photoUrl; // Reset the src after restoring HTML
                
                alert("تم تحديث الصورة الشخصية بنجاح!");
                location.reload(); // Quick way to sync everything

            } catch (error) {
                console.error("Avatar Upload Error:", error);
                alert("حدث خطأ أثناء رفع الصورة.");
                avatarContainer.innerHTML = originalHTML;
            }
        });
            document.getElementById('brokerDisplayName').textContent = currentUserName;
            // Auto-fill broker info in form
            document.getElementById('brokerName').value = currentUserName;
            document.getElementById('brokerName').readOnly = true;
            document.getElementById('propPhone').value = currentUserPhone;
            
            loadMyProperties(currentUserId);
            loadProfilePhoto(currentUserId);
        } else {
            window.location.href = 'login.html';
        }

        function switchTab(event, tabId) {
            document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        async function loadMyProperties(uid) {
            const list = document.getElementById('myPropertiesList');
            const firestore = db || window.db;
            if (!firestore) return;

            firestore.collection('properties').where('brokerId', '==', uid).onSnapshot(snapshot => {
                list.innerHTML = '';
                document.getElementById('propCount').textContent = snapshot.size;
                
                if (snapshot.empty) {
                    list.innerHTML = '<div style="text-align:center; padding: 40px; grid-column: 1 / -1;"><i class="fa-solid fa-box-open fa-3x" style="color: #cbd5e1; margin-bottom: 15px;"></i><p>لم تقم بإضافة أي عقارات بعد.</p></div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'prop-card';
                    card.innerHTML = `
                        <img src="${data.imageUrl}" alt="${data.title}">
                        <div class="prop-card-body">
                            <h3>${data.title}</h3>
                            <div class="prop-card-price">${data.price.toLocaleString()} ج.م</div>
                            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 5px;"><i class="fa-solid fa-location-dot"></i> ${data.area}</p>
                            <p style="color: #64748b; font-size: 0.9rem;"><i class="fa-solid fa-ruler-combined"></i> ${data.size} م²</p>
                            
                            <div class="prop-card-actions" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px;">
                                <a href="property.html?id=${doc.id}" target="_blank" class="btn-view" title="عرض" style="background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.9rem; text-decoration: none;">
                                    <i class="fa-solid fa-eye"></i> عرض
                                </a>
                                <button onclick="copyShareLink('${doc.id}')" class="btn-share" title="مشاركة" style="background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.9rem;">
                                    <i class="fa-solid fa-share-nodes"></i> مشاركة
                                </button>
                                <div style="display: flex; width: 100%; gap: 8px;">
                                    <button onclick="prepareEditProperty('${doc.id}')" class="btn-edit" title="تعديل" style="background: #fbbf24; color: #1e293b; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.9rem;">
                                        <i class="fa-solid fa-pen-to-square"></i> تعديل
                                    </button>
                                    <button onclick="deleteMyProperty('${doc.id}')" class="btn-delete" title="حذف" style="background: #ef4444; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.9rem;">
                                        <i class="fa-solid fa-trash"></i> حذف
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        // Share Link Functionality
        function copyShareLink(propId) {
            const shareUrl = window.location.origin + window.location.pathname.replace('dashboard.html', 'property.html') + '?id=' + propId;
            // Fallback for file:// or other protocols
            let finalUrl = shareUrl;
            if (window.location.protocol === 'file:') {
                finalUrl = window.location.href.replace('dashboard.html', 'property.html') + '?id=' + propId;
            }

            navigator.clipboard.writeText(finalUrl).then(() => {
                alert("تم نسخ رابط العقار بنجاح! يمكنك الآن مشاركته مع أي شخص.");
            }).catch(err => {
                console.error('Failed to copy: ', err);
                prompt("انسخ الرابط التالي لمشاركته:", finalUrl);
            });
        }

        // Prepare Edit Mode
        async function prepareEditProperty(propId) {
            const firestore = db || window.db;
            if (!firestore) return;

            try {
                const doc = await firestore.collection('properties').doc(propId).get();
                if (!doc.exists) return;

                const data = doc.data();
                
                // Switch to Add Prop tab (which we will repurpose as Edit)
                switchTab(null, 'addProp');
                
                // Update UI for Edit mode
                editMode = true;
                editId = propId;
                existingImages = data.imageUrls || [];
                
                document.querySelector('.dashboard-header h2').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> تعديل بيانات العقار';
                document.getElementById('btnSubmit').innerHTML = '<i class="fa-solid fa-save"></i> حفظ التعديلات';
                
                // Fill form
                document.getElementById('propTitle').value = data.title;
                document.getElementById('brokerName').value = data.brokerName;
                document.getElementById('propType').value = data.type;
                document.getElementById('propArea').value = data.area;
                document.getElementById('propPrice').value = data.price;
                document.getElementById('propSize').value = data.size;
                document.getElementById('propFloors').value = data.floors || '';
                document.getElementById('propPhone').value = data.brokerPhone;
                document.getElementById('propDesc').value = data.description;
                
                // Show floor container if needed
                if (data.type === 'house' || data.type === 'villa') {
                    document.getElementById('floorsContainer').style.display = 'block';
                } else {
                    document.getElementById('floorsContainer').style.display = 'none';
                }

                // Smooth scroll to top of form
                window.scrollTo({ top: 0, behavior: 'smooth' });

                // Render existing images
                renderThumbnails();

            } catch (error) {
                console.error("Error fetching for edit:", error);
                alert("حدث خطأ أثناء تحميل بيانات العقار.");
            }
        }

        async function deleteMyProperty(propId) {
            if (confirm("هل أنت متأكد من حذف هذا العقار نهائياً؟")) {
                try {
                    const firestore = db || window.db;
                    if (!firestore) throw new Error("قاعدة البيانات غير متصلة.");

                    // Log the deletion action for the Master Admin
                    await firestore.collection('logs').add({
                        action: 'delete_property',
                        brokerId: currentUserId,
                        brokerName: document.getElementById('brokerName').value,
                        propertyId: propId,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    // Proceed with deletion
                    await firestore.collection('properties').doc(propId).delete();
                } catch(e) {
                    alert("عذراً، حدث خطأ أو ليس لديك صلاحية الحذف.");
                }
            }
        }
        
        let selectedFiles = [];

        document.getElementById('propImage').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                files.forEach(file => {
                    selectedFiles.push(file);
                });
                renderThumbnails();
            }
            e.target.value = '';
        });

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderThumbnails();
        }

        function removeExistingImage(index) {
            existingImages.splice(index, 1);
            renderThumbnails();
        }

        function renderThumbnails() {
            const container = document.getElementById('thumbnailsContainer');
            const addButton = container.querySelector('.btn-add-img');
            
            // Remove existing thumbnails but keep the add button
            container.querySelectorAll('.thumbnail-box').forEach(el => el.remove());

            // 1. Render Existing Images (if in edit mode)
            existingImages.forEach((url, i) => {
                const div = document.createElement('div');
                div.className = 'thumbnail-box';
                div.style = 'position: relative; width: 100px; height: 100px; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;';
                div.innerHTML = `
                    <img src="${url}" style="width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9);">
                    <button type="button" onclick="removeExistingImage(${i})" style="position: absolute; top: 0; right: 0; background: rgba(239, 68, 68, 0.9); color: white; border: none; width: 25px; height: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; border-bottom-left-radius: 8px;" title="حذف من الصور الحالية">&times;</button>
                    <div style="position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); color: white; font-size: 0.6rem; text-align: center; padding: 2px;">صورة قديمة</div>
                `;
                container.insertBefore(div, addButton);
            });

            // 2. Render Selected Local Files
            selectedFiles.forEach((file, i) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const div = document.createElement('div');
                    div.className = 'thumbnail-box';
                    div.style = 'position: relative; width: 100px; height: 100px; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; animation: fadeIn 0.3s;';
                    div.innerHTML = `
                        <img src="${event.target.result}" style="width: 100%; height: 100%; object-fit: cover;">
                        <button type="button" onclick="removeFile(${i})" style="position: absolute; top: 0; right: 0; background: rgba(239, 68, 68, 0.9); color: white; border: none; width: 25px; height: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; border-bottom-left-radius: 8px;">&times;</button>
                    `;
                    container.insertBefore(div, addButton);
                }
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('propType').addEventListener('change', function(e) {
            const floorsContainer = document.getElementById('floorsContainer');
            if (e.target.value === 'house' || e.target.value === 'villa') {
                floorsContainer.style.display = 'block';
            } else {
                floorsContainer.style.display = 'none';
            }
        });

        document.getElementById('addPropertyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const alertBox = document.getElementById('dashAlert');
            const files = selectedFiles;

            alertBox.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = editMode ? '<i class="fa-solid fa-spinner fa-spin"></i> جاري حفظ التعديلات...' : '<i class="fa-solid fa-spinner fa-spin"></i> جاري الرفع والنشر...';

            try {
                const firestore = db || window.db;
                if (!firestore) throw new Error("قاعدة البيانات غير متصلة.");

                document.getElementById('uploadProgress').style.display = 'block';
                document.getElementById('uploadFill').style.width = '10%';

                let downloadURLs = [...existingImages]; // Start with existing images if any
                if (files.length > 0) {
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('upload_preset', cloudinaryConfig.uploadPreset);

                        const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudinaryConfig.cloudName}/image/upload`, {
                            method: 'POST',
                            body: formData
                        });

                        if (!response.ok) throw new Error('فشل الرفع إلى Cloudinary');

                        const data = await response.json();
                        downloadURLs.push(data.secure_url);

                        const progress = ((i + 1) / files.length) * 80;
                        document.getElementById('uploadFill').style.width = (10 + progress) + '%';
                    }
                }

                document.getElementById('uploadFill').style.width = '90%';

                const propertyData = {
                    title: document.getElementById('propTitle').value,
                    brokerName: document.getElementById('brokerName').value,
                    type: document.getElementById('propType').value,
                    area: document.getElementById('propArea').value,
                    price: parseInt(document.getElementById('propPrice').value) || 0,
                    size: parseInt(document.getElementById('propSize').value) || 0,
                    floors: document.getElementById('propFloors').value ? parseInt(document.getElementById('propFloors').value) : 0,
                    brokerPhone: document.getElementById('propPhone').value,
                    brokerWhatsApp: "2" + document.getElementById('propPhone').value,
                    description: document.getElementById('propDesc').value,
                    imageUrl: downloadURLs.length > 0 ? downloadURLs[0] : 'https://placehold.co/600x400?text=بدون+صورة',
                    imageUrls: downloadURLs,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    brokerId: currentUserId || 'anonymous',
                    brokerPhotoUrl: localStorage.getItem('brokerPhoto') || ''
                };

                if (editMode && editId) {
                    await firestore.collection('properties').doc(editId).update(propertyData);
                    alertBox.textContent = 'تم تحديث العقار بنجاح!';
                } else {
                    propertyData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await firestore.collection('properties').add(propertyData);
                    alertBox.textContent = 'تم نشر العقار بنجاح! سيظهر الآن في الصفحة الرئيسية.';
                }

                document.getElementById('uploadFill').style.width = '100%';
                alertBox.className = 'alert alert-success';
                alertBox.style.display = 'block';

                // Reset form and mode
                document.getElementById('addPropertyForm').reset();
                selectedFiles = []; // Reset file list
                renderThumbnails();
                
                // Revert UI to "Add Mode"
                editMode = false;
                editId = null;
                existingImages = [];
                document.querySelector('.dashboard-header h2').innerHTML = '<i class="fa-solid fa-plus-circle"></i> إضافة عقار جديد';
                btn.innerHTML = '<i class="fa-solid fa-plus"></i> نشر العقار';

                setTimeout(() => {
                    document.getElementById('uploadProgress').style.display = 'none';
                    btn.disabled = false;
                    loadMyProperties(currentUserId);
                }, 2000);

            } catch (error) {
                console.error("Operation Error:", error);
                alertBox.className = 'alert alert-error';
                alertBox.textContent = 'خطأ: ' + (error.message || "حدث خطأ غير متوقع");
                alertBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = editMode ? 'حفظ التعديلات' : 'نشر العقار';
            }
        });

        // Logout
        document.getElementById('btnLogout').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('brokerLogged');
            localStorage.removeItem('brokerId');
            localStorage.removeItem('brokerName');
            localStorage.removeItem('brokerPhone');
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
